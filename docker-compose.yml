version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ithelp-ai
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://ithelp:${POSTGRES_PASSWORD}@db:5432/ithelp
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID:-}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET:-}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ithelp-network

  db:
    image: postgres:16-alpine
    container_name: ithelp-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=ithelp
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ItHelpSecure2024!}
      - POSTGRES_DB=ithelp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ithelp -d ithelp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ithelp-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ithelp-migrate
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    environment:
      - DATABASE_URL=postgresql://ithelp:${POSTGRES_PASSWORD}@db:5432/ithelp
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ithelp-network
    restart: "no"

volumes:
  postgres_data:
    driver: local

networks:
  ithelp-network:
    driver: bridge
